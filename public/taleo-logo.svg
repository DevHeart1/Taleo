<svg viewBox="0 0 320 82" role="img" aria-label="Taleo" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="taleo-logo-cover" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a78bfa" offset="0%" />
      <stop stop-color="#6366f1" offset="100%" />
    </linearGradient>
    <linearGradient id="taleo-logo-pages" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff" offset="0%" />
      <stop stop-color="#fef3c7" offset="100%" />
    </linearGradient>
    <linearGradient id="taleo-logo-star" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffead" offset="0%" />
      <stop stop-color="#fbbf24" offset="100%" />
    </linearGradient>
  </defs>

  <g transform="rotate(-8 39 40)">
    <!-- Book Cover -->
    <path
      d="M16 28 C28 22 38 29 38 29 L38 58 C38 58 28 51 16 57 Z"
      fill="url(#taleo-logo-cover)"
      stroke="#1e1b4b"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <path
      d="M62 28 C50 22 40 29 40 29 L40 58 C40 58 50 51 62 57 Z"
      fill="url(#taleo-logo-cover)"
      stroke="#1e1b4b"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <!-- Book Pages -->
    <path
      d="M18 29 C28 24 37 30 37 30 L37 56 C37 56 28 50 18 55 Z"
      fill="url(#taleo-logo-pages)"
      stroke="#1e1b4b"
      stroke-width="2"
    />
    <path
      d="M60 29 C50 24 41 30 41 30 L41 56 C41 56 50 50 60 55 Z"
      fill="url(#taleo-logo-pages)"
      stroke="#1e1b4b"
      stroke-width="2"
    />
    <!-- Ribbon Bookmark -->
    <path
      d="M38 30 L40 30 L40 64 L37 61 L34 64 L34 30 Z"
      fill="#f43f5e"
    />
    <!-- Star Mascot -->
    <path
      d="M39 12 L42.5 19.5 L50.5 20.5 L44.5 26 L46 34 L39 30 L32 34 L33.5 26 L27.5 20.5 L35.5 19.5 Z"
      fill="url(#taleo-logo-star)"
      stroke="#1e1b4b"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Star Face -->
    <circle cx="36.5" cy="22.5" r="1.5" fill="#1e1b4b" />
    <circle cx="41.5" cy="22.5" r="1.5" fill="#1e1b4b" />
    <path
      d="M37.5 25.5 Q39 27 40.5 25.5"
      stroke="#1e1b4b"
      stroke-width="1.5"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Sparkles -->
    <circle cx="56" cy="16" r="3" fill="#fbbf24" />
    <path d="M12 20l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5Z" fill="#38bdf8" />
  </g>

  <g aria-hidden="true" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="50" font-weight="1000" letter-spacing="-4">
    <text x="82" y="57" fill="#8b5cf6">T</text>
    <text x="117" y="57" fill="#f7a22d">a</text>
    <text x="152" y="57" fill="#50c5c8">l</text>
    <text x="187" y="57" fill="#f57a9d">e</text>
    <text x="222" y="57" fill="#76c78e">o</text>
  </g>
</svg>
